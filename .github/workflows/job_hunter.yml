name: JobSeeker AI Automata

on:
  schedule:
    - cron: '0 8 * * *' # Ejecuta todos los días a las 08:00 UTC (10:00 AM hora de Madrid en verano)
  workflow_dispatch: # Permite ejecución manual desde GitHub

jobs:
  job_seeker:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Configurar Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Instalar Dependencias
      run: npm install

    - name: Ejecutar Autómata (JobSeeker AI)
      env:
        OPENAI_API_KEY: ${{ secrets.API_KEY_OPENAI }}
        RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        EMAIL_USER: "Hjalmar.meza@gmail.com"
        EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
        EMAIL_DESTINATION: "Hjalmar.meza@gmail.com"
      run: node index.js

    - name: Guardar Memoria (seen_jobs.json)
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action Bot"
        git add data/seen_jobs.json
        git commit -m "🤖 [JobSeeker AI] Memoria actualizada con nuevas ofertas" || exit 0
        git push
